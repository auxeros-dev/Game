<!DOCTYPE html>
<html>
<head>
<title>PacWorm Roguelike</title>
<style>
  body { background: black; margin: 0; overflow: hidden; }
  canvas { display: block; margin: auto; background: black; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let state = 'menu';
let running = true;
let player = { x: canvas.width / 2, y: canvas.height / 2, dir: { x: 1, y: 0 }, tail: [], length: 5, speed: 2, score: 0, hp: 3, iframe: 0, xp: 0, xpToNext: 50, abilities: [], dashTimer: 0, dashCd: 0, phaseTimer: 0, phaseCd: 0, shockCd: 0 };
let pellets = [];
let enemies = [];
let level = 1;
let map = [];
let selectingAbility = false;
let abilityChoices = [];
function init() { generateMap(); spawnPellets(20); spawnEnemies(3); requestAnimationFrame(gameLoop); }
function resetRun() { player.x = canvas.width/2; player.y = canvas.height/2; player.dir = {x:1,y:0}; player.tail = []; player.length = 5; player.speed = 2; player.score = 0; player.hp = 3; player.iframe = 0; player.xp = 0; player.xpToNext = 50; player.abilities = []; player.dashTimer=0; player.dashCd=0; player.phaseTimer=0; player.phaseCd=0; player.shockCd=0; level = 1; generateMap(); spawnPellets(20); spawnEnemies(3); }
function generateMap() { map = []; for (let i = 0; i < 22; i++) { map.push({ x: Math.random() * (canvas.width - 60), y: Math.random() * (canvas.height - 60), w: 60, h: 20, type: 'wall' }); } map.push({ x: Math.random() * (canvas.width - 60), y: Math.random() * (canvas.height - 60), w: 50, h: 50, type: 'warp' }); }
function spawnPellets(count) { pellets = []; for (let i = 0; i < count; i++) { pellets.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: 8, type: Math.random() > 0.8 ? 'power' : 'normal' }); } }
function spawnEnemies(count) { enemies = []; for (let i = 0; i < count; i++) { let dx = Math.random() - 0.5; let dy = Math.random() - 0.5; let m = Math.hypot(dx, dy) || 1; enemies.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, dir: { x: dx / m, y: dy / m }, speed: 1.5, length: 4, tail: [] }); } }
function gameLoop() { if (!running) return; update(); draw(); requestAnimationFrame(gameLoop); }
function update() {
  if (state === 'menu' || state === 'controls' || selectingAbility) { return; }
  if (state !== 'playing') return;
  let spd = player.speed + (player.dashTimer>0?2:0);
  if (player.dashTimer>0) player.dashTimer--;
  if (player.dashCd>0) player.dashCd--;
  if (player.phaseTimer>0) player.phaseTimer--;
  if (player.phaseCd>0) player.phaseCd--;
  if (player.shockCd>0) player.shockCd--;
  let nx = player.x + player.dir.x * spd;
  let ny = player.y + player.dir.y * spd;
  let r = 8;
  let canPhase = player.phaseTimer>0;
  let blockedX = false; let blockedY = false;
  for (let i=0;i<map.length;i++) {
    const t = map[i];
    if (t.type==='wall') {
      if (!canPhase && circleRectCollision(nx, player.y, r, t)) blockedX = true;
      if (!canPhase && circleRectCollision(player.x, ny, r, t)) blockedY = true;
    }
  }
  if (!blockedX) player.x = nx;
  if (!blockedY) player.y = ny;
  if (player.x < r) player.x = r;
  if (player.x > canvas.width - r) player.x = canvas.width - r;
  if (player.y < r) player.y = r;
  if (player.y > canvas.height - r) player.y = canvas.height - r;
  player.tail.push({ x: player.x, y: player.y });
  while (player.tail.length > player.length) player.tail.shift();
  for (let i = pellets.length - 1; i >= 0; i--) {
    const p = pellets[i];
    if (dist(player.x, player.y, p.x, p.y) < p.size + r) {
      player.length++;
      player.score += p.type === 'power' ? 50 : 10;
      player.xp += p.type === 'power' ? 15 : 5;
      pellets.splice(i, 1);
    }
  }
  if (player.xp >= player.xpToNext) { player.xp -= player.xpToNext; player.xpToNext = Math.floor(player.xpToNext*1.5)+10; if (player.abilities.length < 3) { selectingAbility = true; abilityChoices = rollAbilityChoices(); } }
  enemies.forEach(e => {
    if (Math.random() > 0.95) {
      let dx = player.x - e.x;
      let dy = player.y - e.y;
      let mag = Math.hypot(dx, dy);
      if (mag > 0) { e.dir.x = dx / mag; e.dir.y = dy / mag; }
    }
    e.x += e.dir.x * e.speed;
    e.y += e.dir.y * e.speed;
    if (e.x < 0) e.x = canvas.width; if (e.x > canvas.width) e.x = 0; if (e.y < 0) e.y = canvas.height; if (e.y > canvas.height) e.y = 0;
  });
  if (player.iframe > 0) player.iframe--;
  enemies = enemies.filter(e => !enemyInsideShockwave(e));
  enemies.forEach(e => {
    if (dist(player.x, player.y, e.x, e.y) < 15 && player.iframe === 0) {
      player.hp--; player.iframe = 60;
      if (player.hp <= 0) { state='menu'; resetRun(); }
    }
  });
  for (let i = 0; i < map.length; i++) {
    const tile = map[i];
    if (tile.type === 'warp') {
      if (pointInRect(player.x, player.y, tile)) {
        level++;
        spawnPellets(20 + level * 5);
        spawnEnemies(3 + level);
        generateMap();
        break;
      }
    }
  }
}
function enemyInsideShockwave(e){ return false; }
function draw() {
  ctx.fillStyle = 'black';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (state === 'menu') { drawTitle(); return; }
  if (state === 'controls') { drawControls(); return; }
  map.forEach(tile => { ctx.fillStyle = tile.type === 'wall' ? '#2222aa' : '#ff00ff'; ctx.fillRect(tile.x, tile.y, tile.w, tile.h); });
  pellets.forEach(p => { ctx.fillStyle = p.type === 'power' ? 'cyan' : 'white'; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
  enemies.forEach(e => { ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(e.x, e.y, 10, 0, Math.PI * 2); ctx.fill(); });
  ctx.fillStyle = player.phaseTimer>0 ? 'aqua' : 'lime';
  player.tail.forEach(seg => { ctx.beginPath(); ctx.arc(seg.x, seg.y, 8, 0, Math.PI * 2); ctx.fill(); });
  ctx.fillStyle = 'white';
  ctx.fillText('Score: ' + player.score, 10, 20);
  ctx.fillText('HP: ' + player.hp, 10, 40);
  ctx.fillText('Level: ' + level, 10, 60);
  ctx.fillText('XP: ' + player.xp + ' / ' + player.xpToNext, 10, 80);
  if (player.dashCd>0) ctx.fillText('Q:Dash CD ' + player.dashCd, 10, 100);
  if (player.shockCd>0) ctx.fillText('W:Shock CD ' + player.shockCd, 10, 120);
  if (player.phaseCd>0) ctx.fillText('E:Phase CD ' + player.phaseCd, 10, 140);
  if (selectingAbility) drawAbilityPicker();
}
function drawTitle(){ ctx.fillStyle='white'; ctx.font='28px sans-serif'; ctx.fillText('PACWORM ROGUELIKE', canvas.width/2-150, canvas.height/2-60); ctx.font='16px sans-serif'; ctx.fillText('Press Enter to Start', canvas.width/2-90, canvas.height/2); ctx.fillText('Press C for Controls', canvas.width/2-95, canvas.height/2+24); }
function drawControls(){ ctx.fillStyle='white'; ctx.font='22px sans-serif'; ctx.fillText('Controls', canvas.width/2-50, 80); ctx.font='16px sans-serif'; let lines=['Arrows: Move','Q: Dash (if chosen)','W: Shockwave (if chosen)','E: Phase Walls (if chosen)','Enter: Start','Esc: Back']; for(let i=0;i<lines.length;i++){ ctx.fillText(lines[i], canvas.width/2-90, 130+i*22);} }
function drawAbilityPicker(){ ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='white'; ctx.font='20px sans-serif'; ctx.fillText('Choose an ability (1-3)', canvas.width/2-110, canvas.height/2-60); for(let i=0;i<abilityChoices.length;i++){ ctx.fillText((i+1)+': '+abilityChoices[i].toUpperCase(), canvas.width/2-90, canvas.height/2 + i*28); } }
function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
function pointInRect(px, py, r) { return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h; }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function circleRectCollision(cx, cy, cr, rect){ const rx=rect.x, ry=rect.y, rw=rect.w, rh=rect.h; const closestX = clamp(cx, rx, rx+rw); const closestY = clamp(cy, ry, ry+rh); const dx = cx - closestX; const dy = cy - closestY; return (dx*dx + dy*dy) < cr*cr; }
function rollAbilityChoices(){ const pool=['dash','shock','phase']; let choices=[]; while(choices.length<3 && choices.length<pool.length){ let pick = pool[Math.floor(Math.random()*pool.length)]; if (!choices.includes(pick) && !player.abilities.includes(pick)) choices.push(pick); } return choices; }
window.addEventListener('keydown', e => {
  if (state==='menu') { if (e.key==='Enter'){ state='playing'; resetRun(); } if (e.key.toLowerCase()==='c'){ state='controls'; } return; }
  if (state==='controls') { if (e.key==='Escape'){ state='menu'; } if (e.key==='Enter'){ state='playing'; resetRun(); } return; }
  if (selectingAbility){ if (['1','2','3'].includes(e.key)){ const idx = parseInt(e.key)-1; const pick = abilityChoices[idx]; if (pick){ player.abilities.push(pick); selectingAbility=false; } } return; }
  if (state!=='playing') return;
  if (e.key === 'ArrowUp') player.dir = { x: 0, y: -1 };
  if (e.key === 'ArrowDown') player.dir = { x: 0, y: 1 };
  if (e.key === 'ArrowLeft') player.dir = { x: -1, y: 0 };
  if (e.key === 'ArrowRight') player.dir = { x: 1, y: 0 };
  if (e.key.toLowerCase()==='q' && player.abilities.includes('dash') && player.dashCd===0){ player.dashTimer=30; player.dashCd=180; player.iframe=30; }
  if (e.key.toLowerCase()==='w' && player.abilities.includes('shock') && player.shockCd===0){ player.shockCd=300; shockwave(); }
  if (e.key.toLowerCase()==='e' && player.abilities.includes('phase') && player.phaseCd===0){ player.phaseTimer=120; player.phaseCd=300; }
});
function shockwave(){ const radius=70; enemies = enemies.filter(e=>{ if (dist(player.x,player.y,e.x,e.y)<=radius){ player.score+=25; player.xp+=10; return false; } return true; }); }
init();
</script>
</body>
</html>
